    #wrap { width: 100vw; height: 100vh; position: relative; }

    .rest-g { cursor: pointer; }

    /* ── Info Panel ── */
    #panel {
      position: fixed;
      background: white;
      border-radius: 20px;
      box-shadow: 0 16px 48px rgba(0,0,0,0.22), 0 4px 12px rgba(0,0,0,0.1);
      width: 300px;
      overflow: hidden;
      display: none;
      z-index: 300;
      transform-origin: top left;
    }
    #panel.show {
      display: block;
      animation: popIn 0.22s cubic-bezier(0.34,1.56,0.64,1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.88); }
      to   { opacity: 1; transform: scale(1); }
    }

    .ph {
      padding: 15px 16px 12px;
      color: white;
      position: relative;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .ph-icon { font-size: 28px; line-height: 1; }
    .ph-text .pn { font-size: 15px; font-weight: 800; line-height: 1.2; }
    .ph-text .pc { font-size: 11px; opacity: 0.82; margin-top: 3px; }

    .px {
      position: absolute; top: 10px; right: 10px;
      background: rgba(255,255,255,0.22);
      border: none; color: white;
      width: 22px; height: 22px; border-radius: 50%;
      cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .px:hover { background: rgba(255,255,255,0.4); }

    .pb { padding: 10px 14px 6px; }
    .mi {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 0; border-bottom: 1px solid #f1f5f9; font-size: 12.5px;
    }
    .mi:last-child { border-bottom: none; }
    .mn { color: #374151; }
    .mp { color: #dc2626; font-weight: 700; font-size: 12px; }

    .pf {
      margin: 6px 14px 10px;
      background: #f8f9fa; padding: 8px 10px;
      border-radius: 10px; font-size: 11px;
      color: #6b7280; line-height: 1.8; border-left: 3px solid currentColor;
    }
    .nlink-wrap { padding: 0 14px 13px; }
    .nlink {
      display: block; text-align: center; padding: 8px;
      background: #03c75a; color: white; border-radius: 10px;
      font-size: 11.5px; font-weight: 700; text-decoration: none;
      transition: background 0.15s;

    .nlink:hover { background: #02a84b; }

const ns = 'http://www.w3.org/2000/svg';
const g  = document.getElementById('rg');
let currentOpen = null;

data.forEach(r => {
  const grp = document.createElementNS(ns, 'g');
  grp.setAttribute('class', 'rest-g');

  const isN    = r.side === 'N';
  const emojiY = isN ? r.y - 78 : r.y + 82;
  const conn1  = isN ? r.y - 14  : r.y + 14;
  const conn2  = isN ? r.y - 60  : r.y + 64;
  const pillY  = isN ? r.y - 56  : r.y + 91;
  const textY  = isN ? r.y - 41  : r.y + 105;
  const pw     = r.name.length * 10 + 22;

  // shadow circle behind emoji
  const shadow = document.createElementNS(ns, 'ellipse');
  shadow.setAttribute('cx', r.x + 2); shadow.setAttribute('cy', emojiY + 24);
  shadow.setAttribute('rx', '18'); shadow.setAttribute('ry', '5');
  shadow.setAttribute('fill', 'rgba(0,0,0,0.12)');
  grp.appendChild(shadow);

  // connector
  const ln = document.createElementNS(ns, 'line');
  ln.setAttribute('x1', r.x); ln.setAttribute('y1', conn1);
  ln.setAttribute('x2', r.x); ln.setAttribute('y2', conn2);
  ln.setAttribute('stroke', r.color); ln.setAttribute('stroke-width', '2');
  ln.setAttribute('stroke-dasharray', '4,3'); ln.setAttribute('opacity', '0.6');
  grp.appendChild(ln);

  // emoji
  const em = document.createElementNS(ns, 'text');
  em.setAttribute('x', r.x); em.setAttribute('y', emojiY + 6);
  em.setAttribute('text-anchor', 'middle'); em.setAttribute('font-size', '38');
  em.textContent = r.emoji;
  grp.appendChild(em);

  // label pill bg (white card)
  const card = document.createElementNS(ns, 'rect');
  card.setAttribute('x', r.x - pw/2 - 1); card.setAttribute('y', pillY - 1);
  card.setAttribute('width', pw + 2); card.setAttribute('height', 23);
  card.setAttribute('rx', '11.5');
  card.setAttribute('fill', 'rgba(0,0,0,0.06)');
  grp.appendChild(card);

  const pl = document.createElementNS(ns, 'rect');
  pl.setAttribute('x', r.x - pw/2); pl.setAttribute('y', pillY);
  pl.setAttribute('width', pw); pl.setAttribute('height', 21);
  pl.setAttribute('rx', '10.5');
  pl.setAttribute('fill', 'white');
  pl.setAttribute('stroke', r.color); pl.setAttribute('stroke-width', '1.8');
  grp.appendChild(pl);

  const tx = document.createElementNS(ns, 'text');
  tx.setAttribute('x', r.x); tx.setAttribute('y', textY);
  tx.setAttribute('text-anchor', 'middle'); tx.setAttribute('font-size', '10');
  tx.setAttribute('font-weight', '700'); tx.setAttribute('fill', r.color);
  tx.textContent = r.name;
  grp.appendChild(tx);

  // location dot (outer glow)
  const glow = document.createElementNS(ns, 'circle');
  glow.setAttribute('cx', r.x); glow.setAttribute('cy', r.y); glow.setAttribute('r', '17');
  glow.setAttribute('fill', r.color); glow.setAttribute('opacity', '0.18');
  grp.appendChild(glow);

  // location dot
  const dot = document.createElementNS(ns, 'circle');
  dot.setAttribute('cx', r.x); dot.setAttribute('cy', r.y); dot.setAttribute('r', '10');
  dot.setAttribute('fill', r.color); dot.setAttribute('stroke', 'white');
  dot.setAttribute('stroke-width', '2.8');
  dot.style.transition = 'r 0.15s';
  grp.appendChild(dot);

  // hover
  grp.addEventListener('mouseenter', () => {
    dot.setAttribute('r', '12');
    glow.setAttribute('r', '22');
    glow.setAttribute('opacity', '0.28');
  });
  grp.addEventListener('mouseleave', () => {
    dot.setAttribute('r', '10');
    glow.setAttribute('r', '17');
    glow.setAttribute('opacity', '0.18');
  });

  // click → toggle
  grp.addEventListener('click', () => {
    const svg = document.querySelector('svg');
    const pt  = svg.createSVGPoint();
    pt.x = r.x; pt.y = r.y;
    const sp = pt.matrixTransform(svg.getScreenCTM());

    if (currentOpen === r.name) {
      document.getElementById('panel').classList.remove('show');
      currentOpen = null;
    } else {
      showP(r, sp.x, sp.y);
      currentOpen = r.name;
    }
  });

  g.appendChild(grp);
});

function showP(r, sx, sy) {
  document.getElementById('pi').textContent = r.emoji;
  document.getElementById('pn').textContent = r.name;
  document.getElementById('pc').textContent = r.cat;
  document.getElementById('ph').style.background =
    `linear-gradient(135deg, ${r.color} 0%, ${r.color}cc 100%)`;
  document.getElementById('pf').style.borderLeftColor = r.color;
  document.getElementById('pm').innerHTML = r.menu.map(
    ([n,p]) => `<div class="mi"><span class="mn">${n}</span><span class="mp">${p}</span></div>`
  ).join('');
  document.getElementById('pf').innerHTML = r.note.replace(/\n/g,'<br>');
  document.getElementById('nlink').href = r.link || '#';

  const panel = document.getElementById('panel');
  panel.classList.remove('show');
  void panel.offsetWidth; // reflow for re-animation

  const pw = 300, ph = 295;
  let left = sx + 20;
  let top  = sy - ph / 2;
  if (left + pw > window.innerWidth - 8) left = sx - pw - 20;
  if (left < 8) left = 8;
  if (top < 8)  top  = 8;
  if (top + ph > window.innerHeight - 8) top = window.innerHeight - ph - 8;

  panel.style.left   = left + 'px';
  panel.style.top    = top  + 'px';
  panel.style.right  = 'auto';
  panel.style.bottom = 'auto';
  panel.classList.add('show');
}

function closeP() {
  document.getElementById('panel').classList.remove('show');
  currentOpen = null;
}

    const c = document.createElementNS(ns, 'circle');
    c.setAttribute('cx', s.x);
    c.setAttribute('cy', cy);
    c.setAttribute('r',  '20');
    c.setAttribute('fill', 'transparent');
    c.style.cursor = 'pointer';
    const tt = document.createElementNS(ns, 'title');
